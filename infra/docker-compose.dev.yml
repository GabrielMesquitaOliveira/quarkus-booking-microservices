services:
  user-service:
    build:
      context: ../user-service
      dockerfile: src/main/docker/Dockerfile.jvm
    command: ./mvnw quarkus:dev
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/user_db
      - QUARKUS_DATASOURCE_USERNAME=sa
      - QUARKUS_DATASOURCE_PASSWORD=sa
    volumes:
      - ../user-service:/usr/src/app
    working_dir: /usr/src/app
    depends_on:
      - postgres

  reservation-service:
    build:
      context: ../reservation-service
      dockerfile: src/main/docker/Dockerfile.jvm
    command: ./mvnw quarkus:dev
    ports:
      - "8081:8080"
      - "5006:5005"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/reservation_db
      - QUARKUS_DATASOURCE_USERNAME=sa
      - QUARKUS_DATASOURCE_PASSWORD=sa
      - QUARKUS_REST_CLIENT_USER_API_URL=http://user-service:8080
    volumes:
      - ../reservation-service:/usr/src/app
    working_dir: /usr/src/app
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=sa
      - POSTGRES_MULTIPLE_DATABASES=user_db,reservation_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - reservation-service
